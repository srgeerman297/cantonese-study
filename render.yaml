services:
  - type: web
    name: cantonese-study
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DB_PATH
        value: /var/data/phrases.db
    disk:
      name: phrases-data
      mountPath: /var/data
      sizeGB: 1
